<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Chicago Docket — Translations</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Georgia, serif;
            background: #0a0a0a;
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }
        h1 {
            font-size: 2.2rem;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            color: #ffffff;
        }
        .subtitle {
            font-size: 1rem;
            color: #888;
            margin-bottom: 50px;
            font-style: italic;
        }
        .series {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 40px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .downloads {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            width: 100%;
            max-width: 420px;
        }
        .download-link {
            display: block;
            padding: 20px 28px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            text-decoration: none;
            color: #e8e8e8;
            transition: all 0.2s ease;
        }
        .download-link:hover {
            background: #222;
            border-color: #4a9ebb;
            transform: translateY(-1px);
        }
        .lang-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .lang-native {
            font-size: 0.9rem;
            color: #999;
        }
        .file-info {
            font-size: 0.75rem;
            color: #555;
            margin-top: 6px;
        }
        .footer {
            margin-top: 60px;
            text-align: center;
            color: #555;
            font-size: 0.8rem;
            line-height: 1.8;
        }
        .footer a {
            color: #4a9ebb;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="series">Velvet Noir Series</div>
    <h1>The Chicago Docket</h1>
    <p class="subtitle">Book One — Available in 4 Languages</p>

    <div class="downloads">
        <a class="download-link" href="TheChicagoDocket_Book1.docx" download>
            <div class="lang-name">English</div>
            <div class="lang-native">Original</div>
            <div class="file-info">.docx format</div>
        </a>
        <a class="download-link" href="TheChicagoDocket_Book1_Ukrainian.docx" download>
            <div class="lang-name">Ukrainian</div>
            <div class="lang-native">Українська</div>
            <div class="file-info">.docx format</div>
        </a>
        <a class="download-link" href="TheChicagoDocket_Book1_Russian.docx" download>
            <div class="lang-name">Russian</div>
            <div class="lang-native">Русский</div>
            <div class="file-info">.docx format</div>
        </a>
        <a class="download-link" href="TheChicagoDocket_Book1_Romanian.docx" download>
            <div class="lang-name">Romanian</div>
            <div class="lang-native">Română</div>
            <div class="file-info">.docx format</div>
        </a>
    </div>

    <div class="footer">
        <p>S.P. Carter</p>
        <p><a href="mailto:VNseries@proton.me">VNseries@proton.me</a></p>
        <p><a href="https://www.amazon.com/dp/B0GX2WYJY6">Available on Amazon</a></p>
    </div>
</body>
</html>
